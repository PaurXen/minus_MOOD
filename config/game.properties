# Game identity
game_title=minus_MOOD
game_version=0.1.0
game_build=dev

# Team / project info
game_author=Pawel Turek, Kacper Wesolowski, Bartosz Zieba
game_description=A simple 2D top-down game where the player controls a character navigating through levels filled with walls and obstacles. The game features smooth movement, collision detection, and a debug mode for development purposes.

# File/config compatibility
config_version=1
level_format_version=1
controls_format_version=1

# Window settings
window_width=900
window_height=600
window_resizable=false

# Startup
default_level=levels/level00.properties

# Debug/development
debug_mode=true
show_debug_text=true
show_collision_shapes=true

# Runtime
target_fps=60
