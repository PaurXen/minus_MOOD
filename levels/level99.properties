#Level metadata
level_format_version=2
level_id=level99
name=Test Level 2
author=Pawel Turek
version=0.1.2
description=Test level using the new vertex/linedef/sector map format.

# Player spawn/settings
player_spawn=120,120,0,0
player_speed=180
player_rotation_speed=2.5
player_radius=6
player_height=48
player_step_height=12

# Sectors
# sector_<id>=floor_height,ceiling_height,floor_material,ceiling_material,light_level
sector_count=1
sector_0=0,128,floor_test,ceiling_test,1.0

# SideDefs
# sidedef_<id>=upper_material,middle_material,lower_material,x_offset,y_offset,transparent
sidedef_count=2
sidedef_0=wall_default,wall_default,wall_default,0,0,false
sidedef_1=wall_inner,wall_inner,wall_inner,0,0,false

# Vertices
# vertex_<id>=x,y
vertex_count=10

# Outer room
vertex_0=60,60
vertex_1=840,60
vertex_2=840,540
vertex_3=60,540

# Inner rectangular obstacle
vertex_4=300,180
vertex_5=500,180
vertex_6=500,320
vertex_7=300,320

# Angled wall
vertex_8=580,390
vertex_9=760,500

# LineDefs
# linedef_<id>=start_vertex,end_vertex,front_sector,back_sector,front_sidedef,back_sidedef,flags,collision_thickness
#
# Use -1 for no back sector / no back sidedef.
#
# flags are separated by |
# available flags:
# BLOCKS_MOVEMENT
# BLOCKS_RAY
# BLOCKS_PROJECTILE
# TRANSPARENT
# TRIGGER
# TWO_SIDED
# ONE_WAY
# DOOR
# WINDOW
# PORTAL
# HIDDEN

linedef_count=9

# Outer room boundaries
linedef_0=0,1,0,-1,0,-1,BLOCKS_MOVEMENT|BLOCKS_RAY|BLOCKS_PROJECTILE,0
linedef_1=1,2,0,-1,0,-1,BLOCKS_MOVEMENT|BLOCKS_RAY|BLOCKS_PROJECTILE,0
linedef_2=2,3,0,-1,0,-1,BLOCKS_MOVEMENT|BLOCKS_RAY|BLOCKS_PROJECTILE,0
linedef_3=3,0,0,-1,0,-1,BLOCKS_MOVEMENT|BLOCKS_RAY|BLOCKS_PROJECTILE,0

# Inner rectangular obstacle
linedef_4=4,5,0,-1,1,-1,BLOCKS_MOVEMENT|BLOCKS_RAY|BLOCKS_PROJECTILE,0
linedef_5=5,6,0,-1,1,-1,BLOCKS_MOVEMENT|BLOCKS_RAY|BLOCKS_PROJECTILE,0
linedef_6=6,7,0,-1,1,-1,BLOCKS_MOVEMENT|BLOCKS_RAY|BLOCKS_PROJECTILE,0
linedef_7=7,4,0,-1,1,-1,BLOCKS_MOVEMENT|BLOCKS_RAY|BLOCKS_PROJECTILE,0

# Angled thick test wall
linedef_8=8,9,0,-1,1,-1,BLOCKS_MOVEMENT|BLOCKS_RAY|BLOCKS_PROJECTILE,16